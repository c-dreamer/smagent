<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>smagent Control Centre</title><style>
:root{color-scheme:dark;--paper:#111827;--panel:#182235;--line:#314158;--ink:#f8fafc;--muted:#a9b7ca;--accent:#f6c945;--good:#75d69b}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#24385a,#101826 52%);font:16px system-ui,sans-serif;color:var(--ink)}main{max-width:1080px;margin:auto;padding:48px 24px}h1{font-size:36px;margin:0 0 6px}.lead{color:var(--muted);margin:0 0 28px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}.panel{background:#121c2bcc;border:1px solid var(--line);border-radius:18px;padding:22px}h2{font-size:17px;margin:0 0 14px;color:var(--accent)}p{line-height:1.5}.tag{display:inline-block;border-radius:999px;background:#223753;color:var(--accent);padding:5px 10px;font-size:13px}input{width:100%;margin:7px 0 13px;padding:11px;border-radius:9px;border:1px solid var(--line);background:#0b1220;color:var(--ink)}button{background:var(--accent);color:#18140a;border:0;border-radius:9px;padding:11px 16px;font-weight:700;cursor:pointer}.video{display:flex;justify-content:space-between;align-items:center;gap:18px;border-top:1px solid var(--line);padding:14px 0}.video a{color:var(--good);font-weight:700;text-decoration:none}.notice{color:var(--muted);font-size:14px}.ok{color:var(--good)}</style></head><body><main>
<h1>smagent Control Centre</h1><p class="lead">Faith Nexus production, review, and future Postiz connection—without automatic publishing.</p>
<div class="grid"><section class="panel"><h2>Publishing</h2><p id="publishing" class="tag"></p><p class="notice">Every video remains in review until you explicitly approve it.</p></section><section class="panel"><h2>Postiz connection</h2><p id="postizStatus" class="notice"></p><label>Postiz URL<input id="postizUrl" placeholder="https://postiz.example.com"></label><label>API key environment variable<input id="postizKey" value="POSTIZ_API_KEY"></label><button id="save">Save connection settings</button><p class="notice">The key itself is never saved in the dashboard.</p></section></div>
<section class="panel" style="margin-top:16px"><h2>Review videos</h2><div id="videos" class="notice">Loading review bundle…</div></section>
</main><script>
async function load(){const data=await fetch('/api/status').then(r=>r.json());document.querySelector('#publishing').textContent=data.publishing.replaceAll('_',' ');document.querySelector('#postizStatus').innerHTML=data.postiz.configured?'<span class="ok">Connection details saved; publishing is still disabled.</span>':'Not configured yet.';postizUrl.value=data.postiz.base_url;postizKey.value=data.postiz.api_key_env;videos.innerHTML=data.videos.length?data.videos.map(v=>`<div class="video"><span>${v.name}<br><small class="notice">${v.review_status.replaceAll('_',' ')}</small></span><a href="/artifacts/${encodeURIComponent(v.path)}" target="_blank">Review video</a></div>`).join(''):'No review videos found.'}
save.onclick=async()=>{const response=await fetch('/api/postiz',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({base_url:postizUrl.value,api_key_env:postizKey.value})});if(!response.ok){alert((await response.json()).error);return}await load()};load();
</script></body></html>
